<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NIQUI</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter',sans-serif;
}

body{
    background:#3a0047;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.app{
    width:360px;
    height:740px;
    background:#4b0066;
    border-radius:30px;
    overflow:hidden;
    box-shadow:0 20px 40px rgba(0,0,0,0.4);
    position:relative;
}

.header{
    padding:30px 20px;
    color:white;
}

.header h2{
    font-size:18px;
    font-weight:500;
    opacity:0.9;
}

.header h1{
    font-size:24px;
    font-weight:700;
    margin-top:5px;
}

.balance-card{
    background:white;
    margin:0 20px;
    padding:20px;
    border-radius:20px;
    margin-top:10px;
}

.balance-card p{
    font-size:14px;
    color:#777;
}

.balance-card h3{
    font-size:28px;
    margin-top:8px;
    color:#4b0066;
}

.actions{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:15px;
    padding:30px 20px;
}

.action{
    background:white;
    padding:15px;
    border-radius:15px;
    text-align:center;
    font-size:14px;
    font-weight:500;
    color:#4b0066;
    cursor:pointer;
    transition:0.2s;
}

.action:hover{
    transform:scale(1.05);
}

.bottom-nav{
    position:absolute;
    bottom:0;
    width:100%;
    background:white;
    display:flex;
    justify-content:space-around;
    padding:15px 0;
}

.bottom-nav div{
    font-size:13px;
    font-weight:600;
    color:#777;
}

.bottom-nav .active{
    color:#4b0066;
}
</style>
</head>

<body>

<div class="app">

    <div class="header">
        <h2>Hola,</h2>
        <h1>Usuario NIQUI</h1>
    </div>

    <div class="balance-card">
        <p>Saldo disponible</p>
        <h3>$ 1.250.000</h3>
    </div>

    <div class="actions">
        <div class="action">Enviar</div>
        <div class="action">Recargar</div>
        <div class="action">Retirar</div>
        <div class="action">Servicios</div>
        <div class="action">Transferir</div>
        <div class="action">Historial</div>
    </div>

    <div class="bottom-nav">
        <div class="active">Inicio</div>
        <div>Tarjeta</div>
        <div>Perfil</div>
    </div>

</div>

</body>
</html>
