<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NIQUI</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter', sans-serif;
}

body{
    background: linear-gradient(135deg,#3a0047,#6a0dad);
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
}

.app{
    width:360px;
    background:#fff;
    border-radius:25px;
    padding:25px;
    box-shadow:0 20px 50px rgba(0,0,0,0.3);
}

.logo{
    text-align:center;
    font-size:28px;
    font-weight:700;
    color:#6a0dad;
    margin-bottom:20px;
}

.balance-card{
    background:linear-gradient(135deg,#6a0dad,#9b30ff);
    color:#fff;
    padding:20px;
    border-radius:20px;
    margin-bottom:25px;
}

.balance-card h3{
    font-weight:400;
    font-size:14px;
    opacity:0.8;
}

.balance-card h1{
    font-size:28px;
    margin-top:5px;
}

.user{
    margin-bottom:20px;
}

.user span{
    font-weight:600;
    color:#6a0dad;
}

.buttons{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
}

button{
    padding:15px;
    border:none;
    border-radius:15px;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
}

.primary{
    background:#6a0dad;
    color:#fff;
}

.secondary{
    background:#eee;
    color:#333;
}

button:hover{
    transform:scale(1.05);
}
</style>
</head>

<body>

<div class="app">

<div class="logo">NIQUI</div>

<div class="balance-card">
    <h3>Saldo disponible</h3>
    <h1>$ 2.450.000</h1>
</div>

<div class="user">
    Usuario: <span>Juan Perez</span>
</div>

<div class="buttons">
    <button class="primary">Enviar</button>
    <button class="secondary">Recargar</button>
    <button class="secondary">Movimientos</button>
    <button class="primary">Retirar</button>
</div>

</div>

</body>
</html>
